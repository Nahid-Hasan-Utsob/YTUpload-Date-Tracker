<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rooher Drishti — YT Tracker Pro</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 100%);
            color: #e2e8f0;
            padding: 10px;
            min-height: 100vh;
        }
        .container { max-width: 820px; margin: 0 auto; }

        /* HEADER */
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 18px 24px;
            border-radius: 12px;
            margin-bottom: 22px;
            box-shadow: 0 8px 32px rgba(102,126,234,0.25);
            display: flex;
            align-items: center;
            gap: 14px;
        }
        header h1 {
            font-size: 20px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.3px;
        }
        header p { font-size: 11.5px; opacity: 0.88; margin-top: 3px; }

        /* ADD VIDEO */
        .add-section {
            background: #1e293b;
            border: 2px dashed #667eea;
            padding: 18px 20px;
            border-radius: 10px;
            margin-bottom: 22px;
        }
        .add-title { font-size: 14px; font-weight: bold; color: #fbbf24; margin-bottom: 12px; }
        .add-row {
            display: grid;
            grid-template-columns: 1fr 180px 110px;
            gap: 10px;
            align-items: end;
        }
        .field-group { display: flex; flex-direction: column; gap: 4px; }
        .field-group label { font-size: 11px; color: #94a3b8; font-weight: 600; }
        input[type="text"], input[type="number"], select {
            padding: 9px 11px;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 13px;
            width: 100%;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 9px 18px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 14px rgba(102,126,234,0.35); }
        .btn-submit {
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            transition: all 0.2s;
        }
        .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 14px rgba(5,150,105,0.35); }

        /* VIDEO CARDS */
        .videos-container { display: grid; gap: 18px; }
        .video-card {
            background: #1e293b;
            border-left: 5px solid #667eea;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }
        .video-header {
            background: linear-gradient(90deg, rgba(102,126,234,0.12) 0%, transparent 100%);
            padding: 14px 18px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }
        .video-title { font-size: 14px; font-weight: bold; color: #fbbf24; margin-bottom: 4px; }
        .video-meta { font-size: 11px; color: #94a3b8; }
        .header-actions { display: flex; gap: 8px; align-items: center; }
        .toggle-btn {
            background: transparent;
            border: none;
            color: #667eea;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
        }
        .del-btn {
            background: #dc2626;
            color: white;
            border: none;
            width: 32px; height: 32px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            display: flex; align-items: center; justify-content: center;
        }
        .video-body { padding: 16px; overflow: hidden; max-height: 9999px; transition: max-height 0.4s ease; }
        .video-body.collapsed { max-height: 0; padding: 0 16px; }

        /* DAY SECTIONS */
        .day-section {
            background: #0f172a;
            border-left: 4px solid #667eea;
            border-radius: 8px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .day-section.d2 { border-left-color: #08a88a; }
        .day-section.d3p { border-left-color: #fbbf24; }
        .day-hdr {
            padding: 12px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }
        .day-hdr:hover { background: rgba(255,255,255,0.03); }
        .day-hdr-left { display: flex; align-items: center; gap: 10px; }
        .day-label { font-weight: bold; font-size: 13px; }
        .day-time { font-size: 11px; color: #94a3b8; background: #1e293b; padding: 3px 7px; border-radius: 4px; }
        .day-toggle { font-size: 16px; color: #667eea; transition: transform 0.3s; }
        .day-toggle.closed { transform: rotate(-90deg); }
        .day-body { padding: 0 14px 14px; }
        .day-body.collapsed { display: none; }

        /* INPUTS GRID */
        .inputs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 4px;
        }
        .inp-group { display: flex; flex-direction: column; gap: 3px; }
        .inp-group label { font-size: 11px; color: #94a3b8; font-weight: 600; }
        .inp-group input, .inp-group select {
            padding: 7px 9px;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 5px;
            color: #e2e8f0;
            font-size: 12px;
        }

        /* SOURCE SECTION */
        .source-section {
            background: #1a2540;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 10px 12px;
            margin-top: 10px;
        }
        .source-title { font-size: 11px; color: #667eea; font-weight: bold; margin-bottom: 8px; }
        .source-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }

        /* SAVED DAY DISPLAY */
        .saved-data { background: #1e293b; border-radius: 6px; padding: 10px 12px; }
        .saved-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 6px; }
        .saved-chip {
            background: #0f172a;
            border-radius: 4px;
            padding: 4px 9px;
            font-size: 11px;
            color: #cbd5e1;
        }
        .saved-chip span { color: #fbbf24; font-weight: bold; }

        /* METRICS */
        .metrics-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        .metric-box {
            background: #1e293b;
            padding: 10px;
            border-radius: 6px;
            border-left: 3px solid #667eea;
            text-align: center;
        }
        .metric-box.pos { border-left-color: #16a34a; background: rgba(22,163,74,0.08); }
        .metric-box.neg { border-left-color: #dc2626; background: rgba(220,38,38,0.08); }
        .metric-val { font-size: 15px; font-weight: bold; color: #fbbf24; }
        .metric-lbl { font-size: 10px; color: #94a3b8; margin-top: 2px; }

        /* SOURCE BREAKDOWN */
        .src-breakdown {
            background: #1a2540;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 8px 12px;
            margin-top: 8px;
            font-size: 11px;
        }
        .src-row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid #1e293b; }
        .src-row:last-child { border-bottom: none; }
        .src-name { color: #94a3b8; }
        .src-val { color: #fbbf24; font-weight: bold; }
        .src-delta { color: #34d399; font-size: 10px; }
        .src-delta.neg { color: #f87171; }

        /* DECISION */
        .decision-box {
            margin-top: 14px;
            padding: 14px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 2px solid #667eea;
            border-radius: 8px;
        }
        .decision-label { font-size: 12px; font-weight: bold; color: #667eea; margin-bottom: 8px; }
        .decision-status {
            padding: 11px 14px;
            border-radius: 6px;
            font-weight: bold;
            text-align: center;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .s-delay { background: linear-gradient(135deg, #dc2626, #b91c1c); color: white; }
        .s-wait  { background: linear-gradient(135deg, #ea580c, #c2410c); color: white; }
        .s-upload{ background: linear-gradient(135deg, #16a34a, #15803d); color: white; }
        .decision-msg {
            font-size: 12px;
            color: #cbd5e1;
            line-height: 1.65;
            background: #0f172a;
            padding: 10px;
            border-radius: 5px;
            border-left: 3px solid #667eea;
            white-space: pre-wrap;
        }

        /* ANALYSIS */
        .analysis-box {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 14px;
            margin-top: 10px;
        }
        .analysis-title { font-size: 13px; font-weight: bold; color: #fbbf24; margin-bottom: 8px; }
        .analysis-text {
            font-size: 11.5px;
            color: #cbd5e1;
            line-height: 1.75;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
        }

        /* EMPTY */
        .empty { text-align: center; padding: 40px 20px; color: #475569; }
        .empty-icon { font-size: 44px; margin-bottom: 12px; }
        .empty-text { font-size: 13px; line-height: 1.6; }

        @media (max-width: 600px) {
            .add-row { grid-template-columns: 1fr; }
            .inputs-grid { grid-template-columns: 1fr; }
            .source-grid { grid-template-columns: 1fr 1fr; }
            .metrics-row { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
<div class="container">

    <header>
        <h1>
            <svg width="30" height="30" viewBox="0 0 64 64" fill="none">
                <rect width="64" height="64" rx="13" fill="rgba(255,255,255,0.18)"/>
                <rect x="8" y="38" width="10" height="16" rx="2" fill="rgba(255,255,255,0.45)"/>
                <rect x="22" y="28" width="10" height="26" rx="2" fill="rgba(255,255,255,0.65)"/>
                <rect x="36" y="16" width="10" height="38" rx="2" fill="white"/>
                <polyline points="13,37 27,26 41,15 55,7" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                <circle cx="55" cy="7" r="3.5" fill="#fbbf24"/>
            </svg>
            Rooher Drishti
        </h1>
        <p>YouTube Momentum Tracker Pro — Smart Analytics & Decision Engine</p>
    </header>

    <div class="add-section">
        <div class="add-title">➕ নতুন ভিডিও যোগ করুন</div>
        <div class="add-row">
            <div class="field-group">
                <label>ভিডিও শিরোনাম</label>

<script>
// ── Helpers ──────────────────────────────────────────────
function parseTime(v) {
    v = String(v).trim();
    if (v.includes(':')) {
        const [m, s] = v.split(':');
        return parseFloat(m) + (parseFloat(s) || 0) / 60;
    }
    return parseFloat(v) || 0;
}

function parseK(v) {
    v = String(v).trim().toUpperCase();
    if (v.endsWith('K')) return Math.round(parseFloat(v) * 1000);
    if (v.endsWith('M')) return Math.round(parseFloat(v) * 1000000);
    return parseInt(v) || 0;
}

function fmtTime(dec) {
    const m = Math.floor(dec);
    const s = Math.round((dec - m) * 60);
    return `${m}:${String(s).padStart(2,'0')}`;
}

function fmtNum(n) {
    if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n/1000).toFixed(1) + 'K';
    return String(n);
}

const SRC_LABELS = {
    upnext:       'Up Next (Suggested) ⭐',
    home:         'YouTube Home (Browse)',
    search:       'YouTube Search',
    notification: 'Notifications',
    otheryt:      'Other YT Features',
    direct:       'Direct or Unknown',
    external:     'External / Share',
    other:        'Other'
};

const SRC_OPTS = `
    <option value="">-- বেছে নিন --</option>
    <optgroup label="YouTube Recommendations">
        <option value="upnext">Up Next (Suggested) ⭐ সবচেয়ে শক্তিশালী</option>
        <option value="home">YouTube Home (Browse)</option>
    </optgroup>
    <optgroup label="অন্যান্য">
        <option value="search">YouTube Search</option>
        <option value="notification">Notifications</option>
        <option value="otheryt">Other YouTube Features</option>
        <option value="direct">Direct or Unknown</option>
        <option value="external">External / Share</option>
        <option value="other">Other</option>
    </optgroup>`;

// ── Decision Engine ───────────────────────────────────────
function makeDecision(video) {
    const d = video.days;
    const d1 = d.day1, d2 = d.day2, d3 = d.day3, d4 = d.day4;

    if (!d1) return { status:'wait', emoji:'⏳', title:'অপেক্ষা করুন', msg:'Day 1 (রাত ৯টা) এর ডেটা জমা দিন।' };
    if (!d2) return { status:'wait', emoji:'⏳', title:'অপেক্ষা করুন', msg:'Day 2 এর ডেটা জমা দিন।' };

    const growth12 = d1.views ? ((d2.views - d1.views) / d1.views * 100) : 0;

    // ── Day 3 logic ──
    if (d3) {
        const growth23 = d2.views ? ((d3.views - d2.views) / d2.views * 100) : 0;
        const ctr3 = parseFloat(d3.ctr) || 0;
        const avd3 = parseFloat(d3.avd) || 0;
        const src3 = d3.topSource || '';

        // Per-day source delta
        const homeD3  = d3.srcHome - (d2.srcHome || 0);
        const upnextD3 = d3.srcUpnext - (d2.srcUpnext || 0);
        const totalSrcD3 = homeD3 + upnextD3;
        const dayOnlyViewsD3 = d2.views ? (d3.views - d2.views) : d3.views;
        const algoRatioD3 = dayOnlyViewsD3 > 0 ? (totalSrcD3 / dayOnlyViewsD3 * 100) : 0;

        const isAlgo = ['upnext','home','notification','otheryt'].includes(src3);
        const isUpNext = src3 === 'upnext';
        const isExternal = src3 === 'external';
        const isSearch = src3 === 'search';

        // AVD threshold (weighted by growth)
        let avdTh = growth23 > 200 || ctr3 >= 6 ? video.length * 0.20
                  : growth23 > 100              ? video.length * 0.22
                  :                               video.length * 0.25;

        const srcInfo = src3 ? `\n📍 Top Source: ${SRC_LABELS[src3]}` : '';
        const srcDeltaInfo = (d2.srcHome !== undefined && d3.srcHome !== undefined)
            ? `\n   • YouTube Home এ এসেছে (Day 3): ${fmtNum(homeD3)} views\n   • Up Next এ এসেছে (Day 3): ${fmtNum(upnextD3)} views`
            : '';

        // Day 4 check
        if (d4) {
            const growth34 = d3.views ? ((d4.views - d3.views) / d3.views * 100) : 0;
            const isSlowing = growth34 < growth23 * 0.5;
            if (isSlowing || growth34 < 10) {
                return { status:'upload', emoji:'✅', title:'এখন আপলোড করুন',
                    msg:`📉 Day 4 এ momentum কমে গেছে।\n• Day 2→3 Growth: +${growth23.toFixed(0)}%\n• Day 3→4 Growth: ${growth34 > 0 ? '+' : ''}${growth34.toFixed(0)}%\n\nসঠিক সময় এসেছে — পরবর্তী ভিডিও আপলোড করুন।` };
            } else {
                return { status:'wait', emoji:'📈', title:'Day 5 দেখুন',
                    msg:`ভিডিও এখনও momentum ধরে রেখেছে।\n• Day 3→4 Growth: +${growth34.toFixed(0)}%\n\nDay 5 ডেটা দিয়ে final সিদ্ধান্ত নিন।` };
            }
        }

        // External = false momentum
        if (isExternal && growth23 > 50) {
            return { status:'upload', emoji:'⚠️', title:'সময়মতো আপলোড করুন',
                msg:`⚠️ Growth দেখাচ্ছে কিন্তু source হলো External/Share — এটা algorithm momentum না।\n\n• Day 3 Growth: +${growth23.toFixed(0)}%${srcInfo}\n\nপরবর্তী ভিডিও নির্ধারিত সময়ে আপলোড করুন।` };
        }

        // Search = slow & steady
        if (isSearch && growth23 > 30) {
            return { status:'wait', emoji:'🔍', title:'Day 4 দেখুন',
                msg:`🔍 Traffic আসছে Search থেকে — slow & steady pattern।\n\n• Day 3 Growth: +${growth23.toFixed(0)}%${srcInfo}\n\nDay 4 ডেটা দিয়ে সিদ্ধান্ত নিন।` };
        }

        // Strong momentum
        if (growth23 > 50 && ctr3 >= 5 && avd3 > avdTh) {
            const bonus = isUpNext ? '\n🔥 Up Next থেকে আসছে — সবচেয়ে শক্তিশালী algorithm signal!'
                        : isAlgo  ? '\n🤖 YouTube algorithm নিজেই push করছে!'
                        : '';
            return { status:'delay', emoji:'🚀', title:'আপলোড ৪৮-৭২ ঘণ্টা ডিলে করুন',
                msg:`শক্তিশালী মোমেন্টাম চলছে!${bonus}\n\n📊 Day 3:\n• Growth: +${growth23.toFixed(0)}%\n• CTR: ${ctr3}%\n• AVD: ${fmtTime(avd3)} (${(avd3/video.length*100).toFixed(0)}% completion)\n• Impressions: ${fmtNum(d3.impressions)}${srcInfo}${srcDeltaInfo}\n\n⏸️ পরবর্তী আপলোড কমপক্ষে ৪৮-৭২ ঘণ্টা পিছিয়ে দিন।` };
        }

        // Moderate
        if (growth23 > 30 || ctr3 >= 4.5) {
            return { status:'wait', emoji:'📈', title:'আরও পর্যবেক্ষণ করুন',
                msg:`ভিডিও বাড়ছে কিন্তু গতি মাঝারি।\n\n• Day 3 Growth: +${growth23.toFixed(0)}%\n• CTR: ${ctr3}%${srcInfo}\n\nDay 4 ডেটা যোগ করে সিদ্ধান্ত নিন।` };
        }

        // Weak Day 3
        return { status:'upload', emoji:'✅', title:'সময়মতো আপলোড করুন',
            msg:`Day 3 এ গতি কমেছে।${srcInfo}\n\nপরবর্তী ভিডিও নির্ধারিত সময়ে আপলোড করুন।` };
    }

    // ── No Day 3 yet — evaluate Day 2 ──
    const ctr2 = parseFloat(d2.ctr) || 0;
    if (growth12 > 50 && ctr2 >= 5) {
        return { status:'wait', emoji:'🤔', title:'Day 3 ডেটা দিন',
            msg:`Day 2 শক্তিশালী দেখাচ্ছে (Growth: +${growth12.toFixed(0)}%, CTR: ${ctr2}%).\n\nDay 3 ডেটা দিলে সঠিক সিদ্ধান্ত নিতে পারব।` };
    }
    if (growth12 > 20 || ctr2 >= 4.5) {
        return { status:'wait', emoji:'⏳', title:'আরও ডেটা লাগবে',
            msg:`Day 2 মাঝারি (Growth: +${growth12.toFixed(0)}%).\n\nDay 3 ডেটা পেলে সঠিক সিদ্ধান্ত আসবে।` };
    }
    return { status:'upload', emoji:'✅', title:'সময়মতো আপলোড করুন',
        msg:`ভিডিও ধীরে বাড়ছে। পরবর্তী ভিডিও নির্ধারিত সময়ে আপলোড করুন।` };
}

// ── Tracker Class ─────────────────────────────────────────
class Tracker {
    constructor() {
        this.videos = JSON.parse(localStorage.getItem('ytv4') || '[]');
        this.collapsed = JSON.parse(localStorage.getItem('ytv4c') || '{}');
        this.collapsedDays = JSON.parse(localStorage.getItem('ytv4cd') || '{}');
        this.render();
    }

    save() {
        localStorage.setItem('ytv4', JSON.stringify(this.videos));
    }

    addVideo() {
        const t = document.getElementById('newTitle').value.trim();
        const l = document.getElementById('newLength').value.trim();
        if (!t || !l) { alert('সব ফিল্ড পূরণ করুন!'); return; }
        this.videos.push({ id: Date.now(), title: t, length: parseTime(l), days: {}, createdAt: new Date().toLocaleString('bn-BD') });
        this.save(); this.render();
        document.getElementById('newTitle').value = '';
        document.getElementById('newLength').value = '';
    }

    deleteVideo(id) {
        if (!confirm('এই ভিডিও মুছবেন?')) return;
        this.videos = this.videos.filter(v => v.id !== id);
        delete this.collapsed[id]; delete this.collapsedDays[id];
        this.save(); this.render();
    }

    toggleVideo(id) {
        this.collapsed[id] = !this.collapsed[id];
        localStorage.setItem('ytv4c', JSON.stringify(this.collapsed));
        this.render();
    }

    toggleDay(vid, day) {
        if (!this.collapsedDays[vid]) this.collapsedDays[vid] = {};
        this.collapsedDays[vid]['d'+day] = !this.collapsedDays[vid]['d'+day];
        localStorage.setItem('ytv4cd', JSON.stringify(this.collapsedDays));
        this.render();
    }

    submitDay(vid, dayNum) {
        const g = (id) => document.getElementById(id)?.value?.trim() || '';
        const views    = parseK(g(`v_${vid}_${dayNum}`));
        const ctr      = parseFloat(g(`ctr_${vid}_${dayNum}`)) || 0;
        const avd      = parseTime(g(`avd_${vid}_${dayNum}`));
        const imp      = parseK(g(`imp_${vid}_${dayNum}`));
        const topSrc   = g(`ts_${vid}_${dayNum}`);
        const srcHome  = parseK(g(`sh_${vid}_${dayNum}`));
        const srcUpnext= parseK(g(`su_${vid}_${dayNum}`));

        if (!views || !ctr || !avd || !imp) { alert('Views, CTR, AVD, Impressions অবশ্যই দিন!'); return; }

        const video = this.videos.find(v => v.id === vid);
        if (!video) return;
        video.days[`day${dayNum}`] = { views, ctr, avd, impressions: imp, topSource: topSrc, srcHome, srcUpnext };
        this.save(); this.render();
    }

    renderSourceInput(vid, dayNum) {
        return `
        <div class="source-section">
            <div class="source-title">📍 Traffic Source (YouTube Studio থেকে)</div>
            <div class="inputs-grid" style="margin-bottom:8px;">
                <div class="inp-group">
                    <label>Top Source (কোনটা সবচেয়ে বেশি?)</label>
                    <select id="ts_${vid}_${dayNum}">${SRC_OPTS}</select>
                </div>
                <div class="inp-group">
                    <label>&nbsp;</label>
                    <div style="font-size:10px;color:#64748b;padding-top:6px;">optional — source দিলে decision আরও accurate হয়</div>
                </div>
            </div>
            <div class="source-grid">
                <div class="inp-group">
                    <label>YouTube Home (cumulative)</label>
                    <input type="text" id="sh_${vid}_${dayNum}" placeholder="1.2K বা 0">
                </div>
                <div class="inp-group">
                    <label>Up Next (cumulative)</label>
                    <input type="text" id="su_${vid}_${dayNum}" placeholder="314 বা 0">
                </div>
                <div class="inp-group">
                    <label>&nbsp;</label>
                    <div style="font-size:10px;color:#64748b;padding-top:6px;">YouTube Studio → Reach → Traffic Sources</div>
                </div>
            </div>
        </div>`;
    }

    renderSavedSourceDelta(day, prevDay, dayNum) {
        if (!day.srcHome && !day.srcUpnext) return '';
        const homeD  = day.srcHome   - (prevDay?.srcHome   || 0);
        const upD    = day.srcUpnext - (prevDay?.srcUpnext || 0);
        const totalD = homeD + upD;
        const dayOnlyViews = prevDay ? (day.views - prevDay.views) : day.views;
        const algoRatio = dayOnlyViews > 0 ? (totalD / dayOnlyViews * 100).toFixed(0) : 0;
        return `
        <div class="src-breakdown">
            <div style="font-size:10px;color:#667eea;font-weight:bold;margin-bottom:4px;">📍 Day ${dayNum} Traffic Source Breakdown</div>
            <div class="src-row">
                <span class="src-name">YouTube Home</span>
                <span class="src-val">${fmtNum(homeD)} views</span>
                <span class="src-delta">(cumul: ${fmtNum(day.srcHome)})</span>
            </div>
            <div class="src-row">
                <span class="src-name">Up Next</span>
                <span class="src-val">${fmtNum(upD)} views</span>
                <span class="src-delta">(cumul: ${fmtNum(day.srcUpnext)})</span>
            </div>
            <div class="src-row">
                <span class="src-name">Algorithm Total (Day ${dayNum})</span>
                <span class="src-val">${fmtNum(totalD)} views</span>
                <span class="src-delta">${algoRatio}% of day's views</span>
            </div>
            ${day.topSource ? `<div class="src-row"><span class="src-name">Top Source</span><span class="src-val">${SRC_LABELS[day.topSource]||day.topSource}</span></div>` : ''}
        </div>`;
    }

    renderVideo(video) {
        const days = video.days;
        const decision = makeDecision(video);
        const isCollapsed = this.collapsed[video.id];
        const cdDays = this.collapsedDays[video.id] || {};
        const maxDays = 6;

        let daysHtml = '';
        for (let i = 1; i <= maxDays; i++) {
            const day = days[`day${i}`];
            const prevDay = i > 1 ? days[`day${i-1}`] : null;
            const cls = i === 1 ? '' : i === 2 ? 'd2' : 'd3p';
            const isClosed = cdDays[`d${i}`];
            const timeLabel = i <= 2 ? 'রাত ৯:০০ PM' : 'রাত ৮:০০ PM';

            if (day) {
                // Saved day
                const growth = prevDay ? ((day.views - prevDay.views) / prevDay.views * 100).toFixed(0) : null;
                const impGrowth = prevDay ? ((day.impressions - prevDay.impressions) / prevDay.impressions * 100).toFixed(0) : null;
                const completion = (day.avd / video.length * 100).toFixed(0);

                let metricsHtml = '';
                if (i > 1 && prevDay) {
                    metricsHtml = `<div class="metrics-row">
                        <div class="metric-box ${growth > 30 ? 'pos' : 'neg'}">
                            <div class="metric-val">${growth > 0 ? '+' : ''}${growth}%</div>
                            <div class="metric-lbl">View Growth</div>
                        </div>
                        <div class="metric-box ${impGrowth > 20 ? 'pos' : 'neg'}">
                            <div class="metric-val">${impGrowth > 0 ? '+' : ''}${impGrowth}%</div>
                            <div class="metric-lbl">Impression Growth</div>
                        </div>
                        <div class="metric-box ${completion >= 40 ? 'pos' : 'neg'}">
                            <div class="metric-val">${completion}%</div>
                            <div class="metric-lbl">AVD Completion</div>
                        </div>
                    </div>`;
                }

                daysHtml += `
                <div class="day-section ${cls}">
                    <div class="day-hdr" onclick="tracker.toggleDay(${video.id},${i})">
                        <div class="day-hdr-left">
                            <span class="day-label">📅 Day ${i}</span>
                            <span class="day-time">${timeLabel}</span>
                            ${growth ? `<span style="font-size:11px;color:${growth>30?'#34d399':'#f87171'};">${growth>0?'+':''}${growth}%</span>` : ''}
                        </div>
                        <span class="day-toggle ${isClosed?'closed':''}">⏷</span>
                    </div>
                    <div class="day-body ${isClosed?'collapsed':''}">
                        <div class="saved-data">
                            <div class="saved-row">
                                <div class="saved-chip">Views <span>${prevDay ? fmtNum(day.views - prevDay.views) : fmtNum(day.views)}</span>${prevDay ? `<span style="color:#64748b;font-size:10px;"> (cumul: ${fmtNum(day.views)})</span>` : ''}</div>
                                <div class="saved-chip">CTR <span>${day.ctr}%</span></div>
                                <div class="saved-chip">AVD <span>${fmtTime(day.avd)}</span></div>
                                <div class="saved-chip">Impressions <span>${prevDay ? fmtNum(day.impressions - prevDay.impressions) : fmtNum(day.impressions)}</span>${prevDay ? `<span style="color:#64748b;font-size:10px;"> (cumul: ${fmtNum(day.impressions)})</span>` : ''}</div>
                                <div class="saved-chip">Completion <span>${completion}%</span></div>
                            </div>
                        </div>
                        ${this.renderSavedSourceDelta(day, prevDay, i)}
                        ${metricsHtml}
                    </div>
                </div>`;

            } else if (i <= 3 || (i > 3 && days[`day${i-1}`])) {
                // Input form for next day
                daysHtml += `
                <div class="day-section ${cls}">
                    <div class="day-hdr" onclick="tracker.toggleDay(${video.id},${i})">
                        <div class="day-hdr-left">
                            <span class="day-label">📅 Day ${i}</span>
                            <span class="day-time">${timeLabel}</span>
                        </div>
                        <span class="day-toggle ${isClosed?'closed':''}">⏷</span>
                    </div>
                    <div class="day-body ${isClosed?'collapsed':''}">
                        <div class="inputs-grid">
                            <div class="inp-group">
                                <label>Views ${i > 1 ? '(cumulative, K format OK)' : '(K format OK: 1.2K)'}</label>
                                <input type="text" id="v_${video.id}_${i}" placeholder="${i===1?'315':'1.2K'}">
                            </div>
                            <div class="inp-group">
                                <label>CTR (%)</label>
                                <input type="text" id="ctr_${video.id}_${i}" placeholder="3.4">
                            </div>
                            <div class="inp-group">
                                <label>AVD (MM:SS বা মিনিট)</label>
                                <input type="text" id="avd_${video.id}_${i}" placeholder="3:14">
                            </div>
                            <div class="inp-group">
                                <label>Impressions (cumulative, K OK)</label>
                                <input type="text" id="imp_${video.id}_${i}" placeholder="7.8K">
                            </div>
                        </div>
                        ${this.renderSourceInput(video.id, i)}
                        <button class="btn-submit" onclick="tracker.submitDay(${video.id},${i})">✅ Day ${i} জমা দিন</button>
                    </div>
                </div>`;
            }
        }

        // Analysis text
        let analysisText = `📋 Video Analysis Report\n${'─'.repeat(36)}\n`;
        analysisText += `📹 ${video.title}\n`;
        analysisText += `⏱️ Length: ${fmtTime(video.length)}\n`;
        analysisText += `📅 Added: ${video.createdAt}\n\n`;

        for (let i = 1; i <= 4; i++) {
            const day = days[`day${i}`];
            if (!day) break;
            const prev = i > 1 ? days[`day${i-1}`] : null;
            const gr = prev ? ((day.views - prev.views) / prev.views * 100).toFixed(0) : null;
            const homeD  = day.srcHome   - (prev?.srcHome   || 0);
            const upnextD= day.srcUpnext - (prev?.srcUpnext || 0);
            analysisText += `Day ${i}:\n`;
            analysisText += `  Views: ${fmtNum(day.views)}${gr ? ` (${gr>0?'+':''}${gr}%)` : ''} | CTR: ${day.ctr}% | AVD: ${fmtTime(day.avd)} | Imp: ${fmtNum(day.impressions)}\n`;
            if (day.topSource) analysisText += `  Top Source: ${SRC_LABELS[day.topSource]||day.topSource}\n`;
            if (day.srcHome || day.srcUpnext) {
                analysisText += `  YT Home (Day ${i}): ${fmtNum(homeD)} | Up Next (Day ${i}): ${fmtNum(upnextD)}\n`;
            }
            analysisText += '\n';
        }

        const statusCls = { delay:'s-delay', wait:'s-wait', upload:'s-upload' }[decision.status] || 's-wait';

        return `
        <div class="video-card">
            <div class="video-header" onclick="tracker.toggleVideo(${video.id})">
                <div>
                    <div class="video-title">${video.title}</div>
                    <div class="video-meta">⏱️ ${fmtTime(video.length)} | 📅 ${video.createdAt}</div>
                </div>
                <div class="header-actions">
                    <button class="toggle-btn">${isCollapsed ? '▶' : '▼'}</button>
                    <button class="del-btn" onclick="event.stopPropagation();tracker.deleteVideo(${video.id})">✕</button>
                </div>
            </div>
            <div class="video-body ${isCollapsed?'collapsed':''}">
                ${daysHtml}
                <div class="decision-box">
                    <div class="decision-label">${decision.emoji} সিদ্ধান্ত</div>
                    <div class="decision-status ${statusCls}">${decision.title}</div>
                    <div class="decision-msg">${decision.msg}</div>
                </div>
                ${Object.keys(days).length > 0 ? `
                <div class="analysis-box">
                    <div class="analysis-title">📊 বিস্তারিত বিশ্লেষণ</div>
                    <div class="analysis-text">${analysisText}</div>
                </div>` : ''}
            </div>
        </div>`;
    }

    render() {
        const c = document.getElementById('videosContainer');
        if (this.videos.length === 0) {
            c.innerHTML = `<div class="empty"><div class="empty-icon">🎬</div><div class="empty-text">কোনো ভিডিও যোগ করা হয়নি।<br>উপরে নতুন ভিডিও যোগ করুন!</div></div>`;
        } else {
            c.innerHTML = this.videos.map(v => this.renderVideo(v)).join('');
        }
    }
}

const tracker = new Tracker();

document.getElementById('newTitle')?.addEventListener('keypress', e => { if (e.key==='Enter') document.getElementById('newLength').focus(); });
document.getElementById('newLength')?.addEventListener('keypress', e => { if (e.key==='Enter') tracker.addVideo(); });
</script>
</body>
</html>
